# Apache reverse-proxy config for a Next.js app.
# Replace `example.com` with your own domain before deploying.
# TLS certificates are expected at /etc/letsencrypt/live/<domain>/ — issued
# by the certbot-standalone service in ../compose.yml.

# ---------------------------------------------------
# GLOBAL SECURITY SETTINGS
# ---------------------------------------------------
ServerSignature Off
ServerTokens Prod

<IfModule mod_headers.c>
    Header always unset X-Powered-By
</IfModule>

# ---------------------------------------------------
# HTTP → HTTPS (non-www)
# ---------------------------------------------------
<VirtualHost *:80>
    ServerName example.com
    ServerAdmin admin@example.com

    RedirectMatch 301 ^/(.*)$ https://example.com/$1
</VirtualHost>

# ---------------------------------------------------
# HTTP www → HTTPS non-www
# ---------------------------------------------------
<VirtualHost *:80>
    ServerName www.example.com
    ServerAdmin admin@example.com

    RedirectMatch 301 ^/(.*)$ https://example.com/$1
</VirtualHost>

# ---------------------------------------------------
# HTTPS www → HTTPS non-www
# ---------------------------------------------------
<VirtualHost *:443>
    ServerName www.example.com
    ServerAdmin admin@example.com

    # TLS
    SSLEngine on
    SSLCertificateKeyFile /etc/letsencrypt/live/example.com/privkey.pem
    SSLCertificateFile /etc/letsencrypt/live/example.com/cert.pem
    SSLCertificateChainFile /etc/letsencrypt/live/example.com/chain.pem

    # HSTS
    <IfModule mod_headers.c>
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        Header always unset X-Powered-By
    </IfModule>

    RedirectMatch 301 ^/(.*)$ https://example.com/$1
</VirtualHost>

# ---------------------------------------------------
# Main HTTPS VirtualHost (non-www)
# ---------------------------------------------------
<VirtualHost *:443>
    ServerName example.com
    ServerAdmin admin@example.com

    # TLS
    SSLEngine on
    SSLCertificateKeyFile /etc/letsencrypt/live/example.com/privkey.pem
    SSLCertificateFile /etc/letsencrypt/live/example.com/cert.pem
    SSLCertificateChainFile /etc/letsencrypt/live/example.com/chain.pem

    # HSTS
    <IfModule mod_headers.c>
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        Header always unset X-Powered-By
    </IfModule>

    # Proxy to Next.js
    RequestHeader set X-Forwarded-Proto "https"
    ProxyRequests     off
    ProxyPreserveHost on
    Timeout 600
    ProxyTimeout 600
    ProxyPass        / http://next/ retry=0 connectiontimeout=30 timeout=600
    ProxyPassReverse / http://next/

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/error_at.log
    CustomLog ${APACHE_LOG_DIR}/access_at.log combined
</VirtualHost>
